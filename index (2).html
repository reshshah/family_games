<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Night HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #141b24;
    --border: rgba(0,255,180,0.15);
    --accent: #00ffb4;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --text: #e8f0f7;
    --muted: #4a5568;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,180,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,180,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,180,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header {
    text-align: center;
    padding: 3rem 0 2rem;
    animation: fadeDown 0.8s ease both;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    border: 1px solid var(--border);
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  .header h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.75rem;
  }

  .header p {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Score bar */
  .hud-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hud-cell {
    background: var(--surface);
    padding: 14px 20px;
    text-align: center;
  }

  .hud-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hud-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Progress dots */
  .progress-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .pdot {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }
  .pdot.done { background: var(--accent); border-color: var(--accent); }
  .pdot.current { background: var(--accent3); border-color: var(--accent3); }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .q-cat {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 2px;
    background: rgba(0,255,180,0.08);
    color: var(--accent);
    border: 1px solid rgba(0,255,180,0.2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.35;
    color: #fff;
    margin-bottom: 1.75rem;
  }

  /* Answers grid */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 520px) { .answers { grid-template-columns: 1fr; } }

  .ans-btn {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    text-align: left;
  }

  .ans-btn:not(.revealed):not(.correct):not(.wrong):hover {
    border-color: rgba(0,255,180,0.3);
    color: var(--text);
    transform: translateY(-1px);
  }

  .ans-btn .rank {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }

  .ans-btn .ans-label { flex: 1; }

  .ans-btn .pct {
    font-family: var(--mono);
    font-size: 11px;
    opacity: 0.6;
  }

  .ans-btn.revealed {
    background: rgba(0,255,180,0.07);
    border-color: rgba(0,255,180,0.3);
    color: var(--accent);
    cursor: default;
  }

  .ans-btn.revealed .rank { color: var(--accent); }

  .ans-btn.hidden-slot {
    opacity: 0.4;
    cursor: default;
  }

  /* Strikes */
  .strikes-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .s-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .strike {
    width: 26px;
    height: 26px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: transparent;
    transition: all 0.3s ease;
  }

  .strike.active {
    background: rgba(255,107,53,0.15);
    border-color: rgba(255,107,53,0.5);
    color: var(--accent2);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover { background: var(--surface2); border-color: rgba(0,255,180,0.4); color: var(--accent); }
  .btn:active { transform: scale(0.97); }

  .btn.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }
  .btn.primary:hover { background: #00e6a0; color: #000; }

  .btn.hidden { display: none; }

  /* Result message */
  .result-msg {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 3px;
    margin-bottom: 1rem;
    display: none;
    letter-spacing: 0.05em;
  }
  .result-msg.show { display: block; }
  .result-msg.win { background: rgba(0,255,180,0.07); border: 1px solid rgba(0,255,180,0.25); color: var(--accent); }
  .result-msg.lose { background: rgba(255,107,53,0.07); border: 1px solid rgba(255,107,53,0.25); color: var(--accent2); }

  /* Final screen */
  .final {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    animation: fadeUp 0.6s ease both;
  }
  .final.show { display: block; }

  .final-trophy { font-size: 56px; margin-bottom: 1rem; }
  .final-score {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .final-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin: 0.5rem 0 1rem;
  }
  .final-msg {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 2rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  /* Scanline flicker on final */
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(0,255,180,0.08);
    pointer-events: none;
    animation: scanline 4s linear infinite;
    z-index: 999;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Pulse on reveal */
  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(0,255,180,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(0,255,180,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,180,0); }
  }

  .ans-btn.pulse { animation: pulse-green 0.5s ease; }

  /* Footer */
  .footer {
    text-align: center;
    padding-top: 3rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="scanline"></div>

<div class="wrap">

  <div class="header">
    <div class="tag">// game night hq — private session</div>
    <h1>Desi Family Feud</h1>
    <p>100 surveyed desis can't be wrong &mdash; find the top answers</p>
  </div>

  <div class="hud-bar" id="hud">
    <div class="hud-cell">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score">0</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Round</div>
      <div class="hud-val" id="qcount">1 / 8</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Strikes</div>
      <div class="hud-val" id="strike-count" style="color: var(--accent2)">0 / 3</div>
    </div>
  </div>

  <div class="progress-bar" id="progress"></div>

  <div id="game-area">
    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Question 01</span>
        <span class="q-cat" id="q-cat">Loading</span>
      </div>
      <div class="q-text" id="q-text">Initializing question...</div>

      <div class="strikes-row">
        <span class="s-label">Strikes</span>
        <div class="strike" id="s1">✕</div>
        <div class="strike" id="s2">✕</div>
        <div class="strike" id="s3">✕</div>
      </div>

      <div class="answers" id="answers"></div>

      <div class="result-msg" id="result-msg"></div>

      <div class="btn-row">
        <button class="btn primary" id="reveal-btn" onclick="revealAll()">Reveal all answers</button>
        <button class="btn hidden" id="next-btn" onclick="nextQuestion()">Next round →</button>
      </div>
    </div>
  </div>

  <div class="final" id="final">
    <div class="final-trophy" id="trophy">🏆</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-label">points scored</div>
    <div class="final-msg" id="final-msg"></div>
    <div class="btn-row" style="justify-content:center; gap: 12px;">
      <button class="btn primary" onclick="restartGame()">Play again</button>
      <button class="btn" onclick="window.location.reload()">Reset</button>
    </div>
  </div>

  <div class="footer">
    &copy; game night hq &nbsp;|&nbsp; private &nbsp;|&nbsp; reshshah.github.io/family_games
  </div>

</div>

<script>
const questions = [
  {
    cat: "Bollywood",
    text: "Name something that happens in EVERY Bollywood movie",
    answers: [
      { text: "Rain scene / romantic dance", pts: 38 },
      { text: "Villain monologue", pts: 22 },
      { text: "Big item / dance number", pts: 18 },
      { text: "Hero's dramatic entry", pts: 12 },
      { text: "Emotional family reunion", pts: 10 },
    ]
  },
  {
    cat: "Immigrant life",
    text: "Top things Indian parents say when you call home from the US",
    answers: [
      { text: "\"Have you eaten?\"", pts: 42 },
      { text: "\"When are you getting married?\"", pts: 28 },
      { text: "\"Call more often\"", pts: 14 },
      { text: "\"Your cousin got a promotion\"", pts: 10 },
      { text: "\"Beta, come back to India\"", pts: 6 },
    ]
  },
  {
    cat: "Tech life",
    text: "Things that happen in EVERY tech meeting",
    answers: [
      { text: "Someone joins late", pts: 35 },
      { text: "\"Can everyone hear me?\"", pts: 27 },
      { text: "Someone's mic is muted", pts: 22 },
      { text: "Meeting runs over time", pts: 11 },
      { text: "Someone shares wrong screen", pts: 5 },
    ]
  },
  {
    cat: "Food",
    text: "Things every desi fridge definitely has",
    answers: [
      { text: "Leftover dal or sabzi", pts: 36 },
      { text: "Box of sweets from India", pts: 24 },
      { text: "Pickle (achar)", pts: 20 },
      { text: "Buttermilk / chaas", pts: 12 },
      { text: "Coriander chutney", pts: 8 },
    ]
  },
  {
    cat: "Desi culture",
    text: "Name something desi parents brag about at parties",
    answers: [
      { text: "Their child's job / company", pts: 40 },
      { text: "Their child's college", pts: 25 },
      { text: "Their house / neighborhood", pts: 18 },
      { text: "Child's salary (indirectly)", pts: 11 },
      { text: "Child married well", pts: 6 },
    ]
  },
  {
    cat: "US life",
    text: "Things that still feel weird after years of living in the US",
    answers: [
      { text: "Tipping culture", pts: 33 },
      { text: "\"How are you?\" with no wait", pts: 29 },
      { text: "How huge the food portions are", pts: 18 },
      { text: "No bargaining at stores", pts: 13 },
      { text: "Saying sorry for everything", pts: 7 },
    ]
  },
  {
    cat: "Bollywood",
    text: "Name a Bollywood actor everyone's parents had a poster of",
    answers: [
      { text: "Amitabh Bachchan", pts: 44 },
      { text: "Shah Rukh Khan", pts: 30 },
      { text: "Rajesh Khanna", pts: 14 },
      { text: "Madhuri Dixit", pts: 8 },
      { text: "Sridevi", pts: 4 },
    ]
  },
  {
    cat: "Tech life",
    text: "Name something every Indian engineer in Silicon Valley has done",
    answers: [
      { text: "Worked at FAANG company", pts: 38 },
      { text: "Joined a startup that failed", pts: 24 },
      { text: "Taken a Google coding interview", pts: 20 },
      { text: "Had manager who mispronounces name", pts: 12 },
      { text: "Mentored another desi engineer", pts: 6 },
    ]
  },
];

let currentQ = 0, score = 0, strikes = 0, revealed = [], questionDone = false;

function initQuestion() {
  const q = questions[currentQ];
  strikes = 0;
  revealed = new Array(q.answers.length).fill(false);
  questionDone = false;

  document.getElementById('q-num').textContent = `Question ${String(currentQ + 1).padStart(2,'0')}`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('qcount').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('strike-count').textContent = `0 / 3`;

  ['s1','s2','s3'].forEach(id => document.getElementById(id).classList.remove('active'));

  const rm = document.getElementById('result-msg');
  rm.className = 'result-msg';
  rm.textContent = '';

  document.getElementById('reveal-btn').classList.remove('hidden');
  document.getElementById('next-btn').classList.add('hidden');

  renderAnswers();
  updateProgress();
}

function renderAnswers() {
  const q = questions[currentQ];
  const container = document.getElementById('answers');
  container.innerHTML = '';
  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    if (revealed[i]) {
      btn.className = 'ans-btn revealed';
      btn.innerHTML = `<span class="rank">#${i+1}</span><span class="ans-label">${a.text}</span><span class="pct">${a.pts}%</span>`;
    } else {
      btn.className = 'ans-btn hidden-slot' + (questionDone ? '' : '');
      btn.innerHTML = `<span class="rank">#${i+1}</span><span class="ans-label" style="color:#2a3a4a;font-family:var(--mono);font-size:12px;letter-spacing:0.1em">▓▓▓▓▓▓▓▓▓▓▓</span>`;
      if (!questionDone) {
        btn.classList.remove('hidden-slot');
        btn.onclick = () => handleGuess(i);
      }
    }
    container.appendChild(btn);
  });
}

function handleGuess(index) {
  if (questionDone || revealed[index]) return;
  const q = questions[currentQ];
  revealed[index] = true;
  score += q.answers[index].pts;
  document.getElementById('score').textContent = score;

  const btns = document.getElementById('answers').children;
  btns[index].classList.add('pulse');

  renderAnswers();
  if (revealed.every(r => r)) endQuestion(true);
}

function addStrike() {
  strikes++;
  document.getElementById('strike-count').textContent = `${strikes} / 3`;
  if (strikes >= 1) document.getElementById('s1').classList.add('active');
  if (strikes >= 2) document.getElementById('s2').classList.add('active');
  if (strikes >= 3) {
    document.getElementById('s3').classList.add('active');
    endQuestion(false);
  }
}

function revealAll() {
  const q = questions[currentQ];
  q.answers.forEach((_, i) => { revealed[i] = true; });
  questionDone = true;
  renderAnswers();
  document.getElementById('reveal-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');

  const rm = document.getElementById('result-msg');
  rm.className = 'result-msg win show';
  rm.textContent = '// All answers revealed. Tally your team scores before moving on.';
}

function endQuestion(won) {
  questionDone = true;
  document.getElementById('reveal-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
  const rm = document.getElementById('result-msg');
  if (won) {
    rm.className = 'result-msg win show';
    rm.textContent = '// Board cleared! Full marks for this round.';
  } else {
    rm.className = 'result-msg lose show';
    rm.textContent = '// Three strikes. The board wins this round.';
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showFinal();
  } else {
    document.getElementById('q-card').style.animation = 'none';
    setTimeout(() => {
      document.getElementById('q-card').style.animation = 'fadeUp 0.4s ease both';
      initQuestion();
    }, 50);
  }
}

function updateProgress() {
  const container = document.getElementById('progress');
  container.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < currentQ ? ' done' : i === currentQ ? ' current' : '');
    container.appendChild(d);
  });
}

function showFinal() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('progress').innerHTML = '';
  const fs = document.getElementById('final');
  fs.classList.add('show');
  document.getElementById('final-score').textContent = score;

  let msg, trophy;
  if (score >= 600)      { msg = "Legendary. You clearly grew up on Doordarshan and Stack Overflow."; trophy = "🏆"; }
  else if (score >= 400) { msg = "Very strong. The surveyed aunties are impressed."; trophy = "🥈"; }
  else if (score >= 200) { msg = "Solid showing. You're invited to the potluck anyway."; trophy = "🥉"; }
  else                   { msg = "Arre yaar! More chai needed before round two."; trophy = "🍵"; }

  document.getElementById('final-msg').textContent = msg;
  document.getElementById('trophy').textContent = trophy;
}

function restartGame() {
  currentQ = 0; score = 0; strikes = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('final').classList.remove('show');
  document.getElementById('game-area').style.display = '';
  initQuestion();
}

initQuestion();
</script>
</body>
</html>
